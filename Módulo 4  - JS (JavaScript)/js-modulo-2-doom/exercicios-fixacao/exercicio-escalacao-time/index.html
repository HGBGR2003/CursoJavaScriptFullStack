<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalação do Time de Futebol</title>
    <script src="script.js"></script>
</head>
<body>
    <h1>Escalação do Time de Futebol</h1>
    <hr>

    <h2>Jogadores</h2>


    <section class="main-things">
        <label for="text">Posicao do Jogador:</label>
        <input type="text" name="posicion" id="posicion">

        <br><br>

        <label for="text">Nome do Jogador:</label>
        <input type="text" name="name" id="name">

        <br><br>

        <label for="text">Número do Jogador:</label>
        <input type="number" name="number" id="numberPlayer">
    </section>

    <br>

    <button onclick="playerAdd()">Escalar Jogador</button>
    <button onclick="playerRemove()">Remover Jogador</button>

    <section id="players-list"></section>

</body>
</html>
